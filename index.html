<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CITY LINKED | Travel Made Simple</title>
  <link href="favicon.ico" rel="icon" type="image/x-icon"/>
  <link href="favicon.ico" rel="shortcut icon" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Gruppo&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Gruppo', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('images/sydney.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;

      display: flex;
      flex-direction: column;
      align-items: center;

      justify-content: flex-start; /* ✅ FIX */
      height: 100vh;
      text-align: center;
      padding: 0 20px;
      position: relative;
    }

    .responsive-logo {
      position: absolute;
      top: clamp(50px, 12vh, 90px);
      left: 50%;
      transform: translateX(-50%);
      height: clamp(80px, 14vw, 230px);
    }

    @media (max-width: 480px) {
      .responsive-logo {
        height: 140px;
        top: 70px;
      }
    }

    /* ✅ NEW: content control */
    .hero-content {
      margin-top: clamp(180px, 30vh, 260px);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      margin-bottom: 30px;
    }

    .cta {
      background: white;
      color: #007399;
      font-weight: bold;
      padding: 12px 34px;
      border-radius: 30px;
      font-size: 1.1rem;
      text-decoration: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .cta:hover {
      background: #00B4DB;
      color: white;
    }

    .trust-box {
      position: fixed;
      bottom: 40px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px 10px;
      border-radius: 16px;
      font-size: 13px;
      text-align: center;
      max-width: 600px;
    }
  </style>

  <!-- Social Meta -->
  <meta property="og:title" content="CITY LINKED | Smart Travel Cards." />
  <meta property="og:description" content="No apps. No accounts. Just fast city guides that open in one tap. Trusted by travellers." />
  <meta property="og:image" content="https://city-linked.github.io/images/share-image.png" />
  <meta property="og:url" content="https://city-linked.github.io/" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CITY LINKED | Smart Travel Cards." />
  <meta name="twitter:description" content="No apps. No accounts. Just fast city guides that open in one tap. Trusted by travellers." />
  <meta name="twitter:image" content="https://city-linked.github.io/images/share-image.png" />
</head>

<body>

  <img src="logo.png" alt="CITY LINKED Logo" class="responsive-logo" />

  <!-- ✅ WRAPPED CONTENT -->
  <div class="hero-content">
    <h1>Plan Less. Explore More.</h1>
    <p>
      Your next trip simplified with Travel Cards <br>
      Everything you need in one place to move smart, fast and freely.
    </p>
    <a href="homepage.html" class="cta">Choose Your City</a>
  </div>

  <div class="trust-box">
    ✅ No logins &nbsp; 🔒 No data collected &nbsp; 🌍 Built by travelers.
  </div>

  <script src="citylinked_tracking.js"></script>

</body>
</html>
